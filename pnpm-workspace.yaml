packages:
  - packages/*

ignoreWorkspaceRootCheck: true

ignoredBuiltDependencies:
  - rollup

onlyBuiltDependencies:
  - esbuild
  - oxc-resolver
  - puppeteer
  - unrs-resolver

publicHoistPattern:
  - '@kitschpatrol/repo-config'
  - '@kitschpatrol/typescript-config'
  - 'case-police'
  - '*cspell*'
  - '*eslint*'
  - '*knip*'
  - '*mdat*'
  - '*prettier*'
  - '*remark*'
  - '*stylelint*'

overrides:
  normalize-package-data: ^8.0.0
